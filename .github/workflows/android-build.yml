name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build the APK using Gradle
      # Removed all Keystore and Base64 environment variables as requested
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'
          cache-disabled: true
          arguments: app:assembleRelease

      # Upload the generated APK
      # Fixed the path to use a wildcard (*.apk) to ensure it finds the file
      # even if it is named 'app-release-unsigned.apk'
      - name: Upload Puter Unofficial APK
        uses: actions/upload-artifact@v4
        with:
          name: Puter-Unofficial-Release
          path: app/build/outputs/apk/release/*.apk